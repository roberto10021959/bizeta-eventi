<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iscrizione — Fastweb AI Work</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
  background: linear-gradient(135deg, #F2A93B 0%, #FFB84D 100%); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  min-height: 100vh; 
  padding: 20px; 
  color: #050505;
}
a { color: #050505; text-decoration: none; }
a:hover { color: #333; }
</style>
</head>
<body>
<div style="width: 100%; max-width: 360px; background: #F2A93B; border-radius: 12px; padding: 32px 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
  <div style="text-align: center; margin-bottom: 32px;">
    <div style="font-size: 48px; font-weight: 700; color: #050505; margin-bottom: 8px;">AI</div>
    <h1 style="font-size: 24px; font-weight: 700; color: #050505; margin-bottom: 8px;">Fastweb AI Work</h1>
    <p style="font-size: 14px; color: #333; line-height: 1.5;">Scopri come l'IA trasforma il lavoro della tua azienda</p>
  </div>

  <form action="https://script.google.com/macros/s/AKfycbxspXqKi9yGct6PptHPK5ba8afPWg0rIM71KMlvhgNL1AiU_RNXj9VnSTJG8sLKxH1z5Q/exec" method="POST" target="_blank" style="display: flex; flex-direction: column; gap: 16px;">
    <div>
      <label style="display: block; font-size: 13px; font-weight: 600; color: #050505; margin-bottom: 6px;">Nome</label>
      <input type="text" name="nome" placeholder="Il tuo nome" style="width: 100%; padding: 12px 14px; border: 1px solid rgba(5,5,5,0.2); border-radius: 6px; font-size: 15px; font-family: inherit; outline: none; background: rgba(255,255,255,0.3);">
    </div>

    <div>
      <label style="display: block; font-size: 13px; font-weight: 600; color: #050505; margin-bottom: 6px;">Email</label>
      <input type="email" name="email" placeholder="tua@email.com" style="width: 100%; padding: 12px 14px; border: 1px solid rgba(5,5,5,0.2); border-radius: 6px; font-size: 15px; font-family: inherit; outline: none; background: rgba(255,255,255,0.3);">
    </div>

    <div>
      <label style="display: block; font-size: 13px; font-weight: 600; color: #050505; margin-bottom: 6px;">Telefono</label>
      <input type="tel" name="telefono" placeholder="+39" style="width: 100%; padding: 12px 14px; border: 1px solid rgba(5,5,5,0.2); border-radius: 6px; font-size: 15px; font-family: inherit; outline: none; background: rgba(255,255,255,0.3);">
    </div>

    <div style="margin-top: 8px;">
      <button type="submit" style="width: 100%; padding: 14px; background: #050505; color: #F2A93B; font-weight: 600; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;">
        Conferma partecipazione
      </button>
    </div>

    <div style="margin-top: 16px; padding: 12px; background: rgba(5,5,5,0.05); border-radius: 6px;">
      <label style="display: flex; align-items: flex-start; gap: 8px; font-size: 11px; color: #333; line-height: 1.4;">
        <input type="checkbox" name="privacy" required style="margin-top: 2px; cursor: pointer;">
        <span>Autorizzo il trattamento dei dati personali ai sensi del GDPR 2016/679 per le sole finalità connesse all'evento</span>
      </label>
    </div>
  </form>

  <p style="font-size: 12px; color: rgba(5,5,5,0.6); text-align: center; margin-top: 20px; line-height: 1.5;">
    27 luglio • 19:30<br>
    Vodafone Store Cannizzaro
  </p>
</div>
</body>
</html>
